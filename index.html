<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-TECH TACTICAL HUD (Web Version)</title>
    <style>
        /* ปรับแต่งหน้าจอให้เป็นสไตล์จอมอนิเตอร์ไซเบอร์ทางทหาร */
        body {
            background-color: #050b05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 20px;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hud-container {
            position: relative;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            border-radius: 4px;
            background: #000;
            line-height: 0;
        }

        /* หน้าจอวิดีโอสด */
        video {
            width: 1280px;
            max-width: 90vw;
            height: auto;
            transform: scaleX(1); /* ปรับเป็น -1 ถ้าอยากให้เป็นกระจกสะท้อน */
        }

        /* เลเยอร์ข้อมูล HUD ด้านบนภาพ */
        .hud-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            line-height: 1.5;
            text-shadow: 2px 2px 4px #000;
        }

        .status-blink {
            animation: blink 1s infinite;
            color: #ff3333;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .btn-capture {
            margin-top: 20px;
            background-color: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-capture:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <h1>[ SYSTEM STATUS: OMNI-TECH TACTICAL CORE ONLINE ]</h1>

    <div class="hud-container">
        <video id="tacticalWebcam" autoplay playsinline></video>
        
        <div class="hud-overlay">
            <div>TACTICAL LINK: <span id="connectionStatus">WAITING...</span></div>
            <div>FPS: <span id="fpsCounter">0</span></div>
            <div>SIGNAL: <span class="status-blink">● LIVE FEED</span></div>
        </div>
    </div>

    <button class="btn-capture" onclick="switchCamera()">SWITCH CAMERA INPUT</button>

    <script>
        const video = document.getElementById('tacticalWebcam');
        const fpsCounter = document.getElementById('fpsCounter');
        const connectionStatus = document.getElementById('connectionStatus');
        
        let lastCalledTime;
        let fps;
        let currentStream = null;

        // ฟังก์ชันคำนวณ FPS บนหน้าเว็บแบบเรียลไทม์
        function calculateFPS() {
            if(!lastCalledTime) {
                lastCalledTime = Date.now();
                fps = 0;
                return;
            }
            let delta = (Date.now() - lastCalledTime)/1000;
            lastCalledTime = Date.now();
            fps = Math.round(1/delta);
            fpsCounter.innerText = fps;
            requestAnimationFrame(calculateFPS);
        }

        // ฟังก์ชันเปิดกล้องเว็บแคม (ซึ่งจะดึงสัญญาณจาก Iriun ที่ติดตั้งในเครื่องมาใช้)
        async function initTacticalCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 60 }
                },
                audio: false
            };

            try {
                // ขออนุญาตเข้าถึงกล้องของคอมพิวเตอร์
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                connectionStatus.innerText = "SECURED (IRIUN/LOCAL)";
                connectionStatus.style.color = "#00ff00";
                
                // เริ่มระบบนับ FPS
                requestAnimationFrame(calculateFPS);
            } catch (error) {
                console.error("Error accessing webcam: ", error);
                connectionStatus.innerText = "STREAM ERROR";
                connectionStatus.style.color = "#ff3333";
                alert("ไม่สามารถเข้าถึงกล้องได้ โปรดอนุญาตให้เว็บเข้าถึงกล้อง หรือตรวจสอบว่าปิดแอปอื่นที่ใช้กล้องอยู่แล้วหรือยัง");
            }
        }

        // ฟังก์ชันสลับกล้อง เผื่อในคอมมีกล้องหลายตัว (เช่น กล้องโน้ตบุ๊ก กับ กล้อง Iriun)
        function switchCamera() {
            // ดึงอุปกรณ์ทั้งหมดมาเช็กแล้วสลับโหมด
            navigator.mediaDevices.enumerateDevices().then(devices => {
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                if(videoDevices.length > 1) {
                    // โค้ดนี้จะช่วยสลับคิวกล้องไปตัวถัดไป
                    alert("ตรวจพบกล้องมากกว่า 1 ตัว ระบบกำลังเปิดช่องสัญญาณถัดไป...");
                    // ในระบบจริงสามารถทำลูปสลับ deviceId ได้
                } else {
                    alert("ระบบตรวจพบกล้องอินพุตหลักเพียงตัวเดียว");
                }
            });
        }

        // เดินเครื่องระบบทันทีเมื่อโหลดหน้าเว็บสำเร็จ
        window.addEventListener('DOMContentLoaded', initTacticalCamera);
    </script>
</body>
</html>
